<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ベトナムの食文化</title>                           
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="ベトナムの代表的な料理、文化、伝統的なレシピを紹介するデモページです。">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>
  <header class="site-header">
    <div class="container">
  <h1>ベトナム料理</h1>
  <p class="tagline">北から南までの伝統の味</p>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h2>このページについて</h2>
      <p>このデモページは、ベトナムの代表的な料理をいくつか紹介します。簡単な説明と写真付きで、HTML/CSS/JS の学習に適しています。</p>
    </section>

    <section class="features">
  <h2>注目の料理</h2>
      <div class="toolbar">
  <input id="search" type="search" placeholder="料理名で検索（例: phở, bánh mì）" aria-label="料理名で検索">
  <button id="shuffle-btn" class="btn">シャッフル</button>
  <button id="random-btn" class="btn">ランダム</button>
      </div>

      <div id="dishes" class="grid">
        <!-- Cards will be rendered here by script.js -->
      </div>
    </section>

    <section class="learn">
      <h2>もっと学びたいですか？</h2>
      <p>ソースファイル（<code>index.html</code>, <code>styles.css</code>, <code>script.js</code>）を開いて、仕組みを学べます。画像の追加や差し替えも簡単です。</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 — ベトナム料理デモページ</div>
  </footer>

  <!-- 料理の詳細モーダル -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
